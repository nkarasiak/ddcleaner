name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ddcleaner
            archive: ddcleaner-linux-amd64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ddcleaner.exe
            archive: ddcleaner-windows-amd64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Build .deb
        run: cargo deb
      - uses: actions/upload-artifact@v4
        with:
          name: ddcleaner-deb
          path: target/debian/*.deb

  release:
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ddcleaner-linux-amd64.tar.gz/ddcleaner-linux-amd64.tar.gz
            artifacts/ddcleaner-windows-amd64.zip/ddcleaner-windows-amd64.zip
            artifacts/ddcleaner-deb/*.deb
          generate_release_notes: true
