<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mangetout — Disk Usage Analyzer</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <!-- Landing page -->
    <div class="landing" id="landing">
        <div class="landing-card">
            <div class="landing-icon" id="landingIcon"></div>
            <h1>mangetout</h1>
            <p class="landing-subtitle">What's eating your disk?</p>
            <div class="volume-list" id="volumeList">
                <div class="volume-loading">Detecting volumes...</div>
            </div>
            <div class="scan-form-toggle">
                <button class="custom-path-toggle" id="customPathToggle">Or scan a custom path...</button>
            </div>
            <div class="scan-form" id="scanForm" style="display:none">
                <input type="text" class="scan-input" id="scanInput" placeholder="/home" value="">
                <button class="scan-btn" id="scanBtn">Scan</button>
            </div>
        </div>
    </div>

    <!-- App layout (hidden until scan starts) -->
    <div class="app-layout" id="appLayout" style="display:none;">
        <!-- Header bar -->
        <header class="header-bar">
            <div class="header-left">
                <span class="header-logo">mangetout</span>
                <div class="disk-summary" id="diskSummary">
                    <div class="disk-bar">
                        <div class="disk-bar-fill" id="diskBarFill"></div>
                    </div>
                    <span class="disk-text" id="diskText"></span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="searchBtn" title="Search (Ctrl+K)" aria-label="Search">
                    <span id="searchBtnIcon"></span>
                    <span class="btn-label">Search</span>
                </button>
                <button class="header-btn" id="rescanBtn" title="Rescan (R)" aria-label="Rescan">
                    <span id="rescanBtnIcon"></span>
                </button>
                <button class="header-btn" id="themeToggle" title="Toggle theme (T)" aria-label="Toggle theme">
                    <span id="themeIcon"></span>
                </button>
                <div class="freshness" id="freshness">
                    <span class="freshness-dot" id="freshnessDot"></span>
                    <span id="freshnessText"></span>
                </div>
            </div>
        </header>

        <!-- Tab bar -->
        <nav class="tab-bar" role="tablist">
            <button class="tab active" role="tab" aria-selected="true" data-tab="explore" id="tabExplore">
                <span class="tab-icon" id="tabExploreIcon"></span>
                Explore
            </button>
            <button class="tab" role="tab" aria-selected="false" data-tab="biggest" id="tabBiggest">
                <span class="tab-icon" id="tabBiggestIcon"></span>
                Biggest Files
            </button>
            <button class="tab" role="tab" aria-selected="false" data-tab="cleanup" id="tabCleanup">
                <span class="tab-icon" id="tabCleanupIcon"></span>
                Smart Cleanup
                <span class="tab-badge" id="cleanupBadge" style="display:none">0</span>
            </button>
            <button class="tab" role="tab" aria-selected="false" data-tab="types" id="tabTypes">
                <span class="tab-icon" id="tabTypesIcon"></span>
                File Types
            </button>
            <div class="tab-indicator" id="tabIndicator"></div>
        </nav>

        <!-- Breadcrumb bar -->
        <div class="breadcrumb-bar" id="breadcrumbBar">
            <nav class="breadcrumb" id="breadcrumb" aria-label="Directory navigation"></nav>
            <div class="breadcrumb-right">
                <span class="status-info" id="statusInfo"></span>
            </div>
        </div>

        <!-- Tab panels -->
        <div class="tab-panels">
            <!-- Explore panel -->
            <div class="tab-panel active" role="tabpanel" id="panelExplore" data-tab="explore">
                <div class="explore-layout">
                    <div class="browser-panel" id="browserPanel">
                        <div class="browser-header">
                            <span class="browser-sort" id="browserSort">Sort: Size</span>
                            <button class="browser-select-all" id="selectAllBtn">Select all</button>
                        </div>
                        <div class="browser-list" id="browserList" role="list"></div>
                    </div>
                    <div class="sunburst-panel" id="sunburstPanel">
                        <canvas id="sunburstCanvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- Biggest Files panel -->
            <div class="tab-panel" role="tabpanel" id="panelBiggest" data-tab="biggest">
                <div class="biggest-list" id="biggestList" role="list"></div>
            </div>

            <!-- Smart Cleanup panel -->
            <div class="tab-panel" role="tabpanel" id="panelCleanup" data-tab="cleanup">
                <div class="cleanup-header">
                    <span class="cleanup-total" id="cleanupTotal"></span>
                    <div class="cleanup-filters" id="cleanupFilters"></div>
                </div>
                <div class="cleanup-list" id="cleanupList"></div>
            </div>

            <!-- File Types panel -->
            <div class="tab-panel" role="tabpanel" id="panelTypes" data-tab="types">
                <div class="types-list" id="typesList"></div>
            </div>
        </div>

        <!-- Selection tray -->
        <div class="selection-tray" id="selectionTray">
            <div class="tray-info">
                <span class="tray-count" id="trayCount">0 items</span>
                <span class="tray-sep">&middot;</span>
                <span class="tray-size" id="traySize">0 B</span>
            </div>
            <div class="tray-actions">
                <button class="tray-clear" id="trayClear">Clear</button>
                <button class="tray-review" id="trayReview">Review &amp; Delete</button>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip" role="tooltip">
        <div class="tooltip-name" id="tooltipName"></div>
        <div class="tooltip-detail" id="tooltipDetail"></div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu" role="menu">
        <div class="ctx-item" id="ctxCopyPath" role="menuitem"><span>Copy path</span><span class="ctx-hint">Ctrl+C</span></div>
        <div class="ctx-item" id="ctxOpenExplorer" role="menuitem"><span>Open in file manager</span><span class="ctx-hint">Ctrl+O</span></div>
        <div class="ctx-sep" role="separator"></div>
        <div class="ctx-item ctx-danger" id="ctxDelete" role="menuitem"><span>Delete</span><span class="ctx-hint">Del</span></div>
    </div>

    <!-- Search command palette -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-panel">
            <div class="search-input-wrap">
                <span class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search files and folders..." autocomplete="off" spellcheck="false">
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <!-- Delete confirmation -->
    <div class="overlay" id="deleteOverlay">
        <div class="delete-confirm" role="alertdialog" aria-labelledby="deleteTitle">
            <h3 id="deleteTitle">Confirm Delete</h3>
            <p id="deleteMsg"></p>
            <div class="delete-actions">
                <button class="delete-cancel" id="deleteCancel">Cancel</button>
                <button class="delete-btn" id="deleteConfirm">Delete permanently</button>
            </div>
        </div>
    </div>

    <!-- Review to Remove overlay -->
    <div class="overlay" id="reviewOverlay">
        <div class="review-panel">
            <div class="review-header">
                <h2>Review &amp; Delete</h2>
                <span class="review-total" id="reviewTotal"></span>
                <button class="review-close" id="reviewClose" aria-label="Close">&times;</button>
            </div>
            <div class="review-list" id="reviewList"></div>
            <div class="review-footer">
                <button class="delete-btn review-delete-all" id="reviewDeleteAll">Delete All Selected</button>
            </div>
        </div>
    </div>

    <!-- Screen reader tree mirror -->
    <ul class="sr-only" id="srTree" role="tree" aria-label="Directory tree"></ul>

    <script src="/app.js"></script>
</body>
</html>
